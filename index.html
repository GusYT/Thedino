<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overwatch Runner</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

canvas {
  border: 2px solid white;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="game" width="1000" height="320"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const GROUND_Y = 250;

let speed = 6;
let score = 0;
let gameStarted = true;
let gameOver = false;
let frame = 0;

const doomfist = new Image();
doomfist.src = "Doomfist.png";

const ana = new Image();
ana.src = "Ana.png";

const jumpSounds = [
  new Audio("hey-there.mp3"),
  new Audio("rising-uppercut.mp3")
];

jumpSounds.forEach(s => s.volume = 0.5);

function playRandomJumpSound() {
  const sound = jumpSounds[Math.floor(Math.random() * jumpSounds.length)];
  sound.currentTime = 0;
  sound.play();
}

const player = {
  x: 100,
  y: GROUND_Y - 88,
  width: 72,
  height: 88,
  vy: 0,
  gravity: 0.8,
  jumpPower: -15,
  grounded: true,
  runCycle: 0,
  squashX: 1,
  squashY: 1,
  bob: 0,
  rotation: 0
};

let enemies = [];
let particles = [];

function jump() {
  if (player.grounded) {
    player.vy = player.jumpPower;
    player.grounded = false;
    player.squashX = 1.1;
    player.squashY = 0.9;

    playRandomJumpSound(); // 🔥 SOUND
  }
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") jump();
});

canvas.addEventListener("click", jump);

function spawnEnemy() {
  enemies.push({
    x: canvas.width,
    y: GROUND_Y - 74,
    width: 58,
    height: 74
  });
}

function updatePlayer() {
  player.vy += player.gravity;
  player.y += player.vy;

  if (player.y >= GROUND_Y - player.height) {
    player.y = GROUND_Y - player.height;
    player.vy = 0;
    player.grounded = true;
  }

  if (player.grounded) {
    player.runCycle += 0.25 + speed * 0.01;
    player.bob = Math.sin(player.runCycle) * 3;
  }

  player.squashX += (1 - player.squashX) * 0.1;
  player.squashY += (1 - player.squashY) * 0.1;
}

function updateEnemies() {
  if (Math.random() < 0.02) spawnEnemy();

  enemies.forEach(e => {
    e.x -= speed;
  });

  enemies = enemies.filter(e => e.x > -50);
}

function checkCollision() {
  for (const e of enemies) {
    if (
      player.x < e.x + e.width &&
      player.x + player.width > e.x &&
      player.y < e.y + e.height &&
      player.y + player.height > e.y
    ) {
      gameOver = true;
    }
  }
}

function drawGround() {
  ctx.fillStyle = "white";
  ctx.fillRect(0, GROUND_Y, canvas.width, 2);
}

function drawPlayer() {
  const w = player.width * player.squashX;
  const h = player.height * player.squashY;

  drawPlayerImage(
    player.x,
    player.y + player.bob,
    w,
    h,
    player.rotation
  );
}

function drawPlayerImage(x, y, w, h, rotation) {
  ctx.save();
  ctx.translate(x + w / 2, y + h / 2);
  ctx.rotate(rotation);

  const run = Math.sin(player.runCycle * 2);

  const srcW = doomfist.naturalWidth;
  const srcH = doomfist.naturalHeight;

  const slices = [
    { sy: 0.0, sh: 0.2, ox: run * 1 },
    { sy: 0.2, sh: 0.2, ox: run * 3 },
    { sy: 0.4, sh: 0.2, ox: -run * 2 },
    { sy: 0.6, sh: 0.2, ox: run * 4 },
    { sy: 0.8, sh: 0.2, ox: -run * 5 }
  ];

  slices.forEach(s => {
    ctx.drawImage(
      doomfist,
      0,
      srcH * s.sy,
      srcW,
      srcH * s.sh,
      -w / 2 + s.ox,
      -h / 2 + h * s.sy,
      w,
      h * s.sh
    );
  });

  ctx.restore();
}

function drawEnemies() {
  enemies.forEach(e => {
    ctx.drawImage(ana, e.x, e.y, e.width, e.height);
  });
}

function drawScore() {
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 20, 30);
}

function gameLoop() {
  frame++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    updatePlayer();
    updateEnemies();
    checkCollision();
  }

  drawGround();
  drawPlayer();
  drawEnemies();
  drawScore();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
