<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overwatch Runner</title>

<style>
body {
  margin: 0;
  background: #0d0e13;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

canvas {
  border: 2px solid white;
  border-radius: 10px;
}
</style>
</head>

<body>

<canvas id="game" width="1000" height="320"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

const GROUND_Y = 250;

let speed = 6;
let score = 0;
let gameStarted = true;
let gameOver = false;

const doomfistRun = new Image();
doomfistRun.src = "pixilart-sprite.png";

const ana = new Image();
ana.src = "Ana.png";

// SOUND
const jumpSounds = [
  new Audio("hey-there.mp3"),
  new Audio("rising-uppercut.mp3")
];

jumpSounds.forEach(s => s.volume = 0.5);

function playRandomJumpSound() {
  const original = jumpSounds[Math.floor(Math.random() * jumpSounds.length)];
  const sound = original.cloneNode();
  sound.volume = original.volume;
  sound.play().catch(()=>{});
}

// SPRITE SETTINGS
let runFrame = 0;
let runTimer = 0;

const FRAME_WIDTH = 200;
const FRAME_HEIGHT = 200;
const TOTAL_FRAMES = 6;

const player = {
  x: 90,
  y: GROUND_Y - 100,
  width: 100,
  height: 100,
  vy: 0,
  gravity: 0.85,
  jumpPower: -15.5,
  grounded: true
};

let enemies = [];

function jump() {
  if (player.grounded && !gameOver) {
    player.vy = player.jumpPower;
    player.grounded = false;
    playRandomJumpSound();
  }
}

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") jump();
});

canvas.addEventListener("click", jump);

function spawnEnemy() {
  enemies.push({
    x: canvas.width,
    y: GROUND_Y - 74,
    width: 58,
    height: 74
  });
}

function updatePlayer() {
  player.vy += player.gravity;
  player.y += player.vy;

  if (player.y >= GROUND_Y - player.height) {
    player.y = GROUND_Y - player.height;
    player.vy = 0;
    player.grounded = true;
  }

  // animation
  if (player.grounded && !gameOver) {
    runTimer++;
    if (runTimer >= 5) {
      runFrame = (runFrame + 1) % TOTAL_FRAMES;
      runTimer = 0;
    }
  } else {
    runFrame = 0;
  }
}

function updateEnemies() {
  if (Math.random() < 0.02) spawnEnemy();

  for (let i = enemies.length - 1; i >= 0; i--) {
    enemies[i].x -= speed;

    if (enemies[i].x + enemies[i].width < 0) {
      enemies.splice(i, 1);
      score++;
    }
  }
}

function checkCollision() {
  for (const e of enemies) {
    if (
      player.x < e.x + e.width &&
      player.x + player.width > e.x &&
      player.y < e.y + e.height &&
      player.y + player.height > e.y
    ) {
      gameOver = true;
    }
  }
}

function drawGround() {
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, GROUND_Y, canvas.width, 2);
}

function drawPlayer() {
  ctx.drawImage(
    doomfistRun,
    runFrame * FRAME_WIDTH, 0,
    FRAME_WIDTH, FRAME_HEIGHT,
    player.x,
    player.y,
    player.width,
    player.height
  );
}

function drawEnemies() {
  enemies.forEach(e => {
    ctx.drawImage(ana, e.x, e.y, e.width, e.height);
  });
}

function drawScore() {
  ctx.fillStyle = "#fff";
  ctx.font = "20px Arial";
  ctx.fillText("Score: " + score, 20, 30);

  if (gameOver) {
    ctx.font = "40px Arial";
    ctx.fillText("GAME OVER", 350, 150);
  }
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!gameOver) {
    updatePlayer();
    updateEnemies();
    checkCollision();
  }

  drawGround();
  drawPlayer();
  drawEnemies();
  drawScore();

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
